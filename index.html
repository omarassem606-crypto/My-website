<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
background:#faffe4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
text-align:center;
}
input{
width:100%;
padding:10px;
margin:10px 0;
box-sizing:border-box;
}
button{
width:100%;
padding:10px;
background:black;
color:white;
border:none;
cursor:pointer;
}
button:hover{
opacity:0.9;
}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>
function login(){
var username=document.getElementById("user").value;
var password=document.getElementById("pass").value;

if(username=="admin" && password=="1234"){
window.location="admin.html";
}
else{
alert("Wrong Login");
}
}
</script>

</body>
</html>
